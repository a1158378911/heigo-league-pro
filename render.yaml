services:
  - type: web
    name: heigo-league-pro
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 2 --access-logfile - --timeout 30 app_prod:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: heigo-db
          property: connectionString
databases:
  - name: heigo-db
    databaseName: heigo_league
    plan: free
