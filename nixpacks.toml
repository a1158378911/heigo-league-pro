[phases.setup]
nixPkgs = ["python310"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[phases.start]
# Gunicorn 启动命令 - 注意：create_app 不带括号
cmds = ["gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 2 --access-logfile - --timeout 30 app_prod:app"]
